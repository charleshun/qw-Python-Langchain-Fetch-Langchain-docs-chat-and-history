{% extends "base.html" %}

{% block body %}
<!-- Sidebar -->
<aside id="sidebar"
    class="w-72 bg-gray-900 border-r border-gray-800 flex flex-col shrink-0 transition-all duration-300">
    <!-- New Chat Button -->
    <div class="p-3">
        <button id="new-chat-btn"
            class="w-full flex items-center gap-2 px-4 py-2.5 rounded-lg bg-gray-800 hover:bg-gray-700 text-sm font-medium transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
            </svg>
            New Chat
        </button>
    </div>

    <!-- Search -->
    <div class="px-3 pb-2">
        <div class="relative">
            <input type="text" id="search-input" placeholder="Search conversations..."
                class="w-full bg-gray-800 border border-gray-700 rounded-lg pl-9 pr-3 py-2 text-sm
                       placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500">
            <svg class="w-4 h-4 absolute left-2.5 top-1/2 -translate-y-1/2 text-gray-500" fill="none"
                 stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/>
            </svg>
        </div>
    </div>

    <!-- Conversation List -->
    <div id="conversation-list" class="flex-1 overflow-y-auto px-2 pb-2">
        {% for c in conversations %}
        <div class="conversation-item group flex items-center gap-2 px-3 py-2.5 rounded-lg cursor-pointer
                     hover:bg-gray-800 transition-colors text-sm {% if loop.first %}active{% endif %}"
             data-id="{{ c.id }}">
            <svg class="w-4 h-4 shrink-0 text-gray-500" fill="none" stroke="currentColor" stroke-width="2"
                 viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M8.625 12a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H8.25m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H12m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 0 1-2.555-.337A5.972 5.972 0 0 1 5.41 20.97a5.969 5.969 0 0 1-.474-.065 4.48 4.48 0 0 0 .978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25Z"/>
            </svg>
            <span class="truncate flex-1">{{ c.title }}</span>
            <button class="delete-btn hidden group-hover:block text-gray-500 hover:text-red-400 transition-colors p-0.5"
                    data-id="{{ c.id }}" title="Delete">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"/>
                </svg>
            </button>
        </div>
        {% else %}
        <div class="text-center text-gray-600 text-sm py-8">No conversations yet</div>
        {% endfor %}
    </div>
</aside>

<!-- Main Chat Area -->
<main class="flex-1 flex flex-col min-w-0">
    <!-- Chat Header -->
    <div class="px-6 py-4 border-b border-gray-800 flex items-center gap-3 shrink-0">
        <h1 id="chat-title" class="text-lg font-semibold truncate">New Conversation</h1>
        <button id="export-btn" class="ml-auto text-gray-500 hover:text-gray-300 transition-colors p-1.5 rounded
                    hover:bg-gray-800" title="Export conversation">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/>
            </svg>
        </button>
    </div>

    <!-- Messages -->
    <div id="messages" class="flex-1 overflow-y-auto px-6 py-6 space-y-6">
        <div id="welcome-screen" class="flex items-center justify-center h-full">
            <div class="text-center text-gray-500">
                <svg class="w-16 h-16 mx-auto mb-4 text-gray-700" fill="none" stroke="currentColor" stroke-width="1.5"
                     viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M8.625 12a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H8.25m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H12m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 0 1-2.555-.337A5.972 5.972 0 0 1 5.41 20.97a5.969 5.969 0 0 1-.474-.065 4.48 4.48 0 0 0 .978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25Z"/>
                </svg>
                <p class="text-lg font-medium">Start a conversation</p>
                <p class="text-sm mt-1">Send a message to begin chatting with the LLM.</p>
            </div>
        </div>
    </div>

    <!-- Input -->
    <div class="px-6 py-4 border-t border-gray-800 shrink-0">
        <div class="flex gap-3">
            <textarea id="message-input" rows="1"
                class="flex-1 bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-sm
                       placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500
                       resize-none"
                placeholder="Type a message..."></textarea>
            <button id="send-btn"
                class="self-end px-5 py-3 bg-blue-600 hover:bg-blue-500 disabled:bg-gray-700
                       disabled:text-gray-500 rounded-xl text-sm font-medium transition-colors">
                Send
            </button>
        </div>
        <p class="text-xs text-gray-600 mt-2 text-center">LLM via llama.cpp &middot; Model: <span id="model-info">default-model</span></p>
    </div>
</main>

<script src="/static/js/chat.js"></script>
<script>
    // Pass initial data to the JS
    window.initialConvoId = {{ conversations[0].id if conversations else 'null' }};
</script>
{% endblock %}
